<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietnam Travel Itinerary &mdash; June 8&ndash;17, 2025</title>
<meta name="description" content="Complete 10-day Vietnam travel guide: Hanoi, Sa Pa, Da Nang, Hoi An, and Ho Chi Minh City.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇻🇳</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
<style>
/* ── RESET & BASE ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e0e6ed;
  background: #0d1117;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block; }
a { color: #58a6ff; text-decoration: none; transition: color .2s; }
a:hover { color: #79c0ff; text-decoration: underline; }

/* ── PALETTE (Dark Mode) ──────────────────────────────────── */
:root {
  --viet-red: #ef5350;
  --viet-gold: #ffb300;
  --viet-green: #4caf50;
  --viet-blue: #42a5f5;
  --viet-teal: #26c6da;
  --viet-purple: #ab47bc;
  --viet-navy: #1a2332;
  --surface-0: #0d1117;
  --surface-1: #161b22;
  --surface-2: #1c2333;
  --surface-3: #243044;
  --border-color: rgba(255,255,255,.08);
  --border-subtle: rgba(255,255,255,.05);
  --day-bg: var(--surface-1);
  --tip-bg: rgba(255,179,0,.08);
  --tip-border: rgba(255,179,0,.35);
  --light-gray: rgba(255,255,255,.1);
  --mid-gray: #8b949e;
  --dark-text: #e0e6ed;
  --card-shadow: 0 2px 16px rgba(0,0,0,.35);
  --card-shadow-hover: 0 8px 32px rgba(0,0,0,.5);
}

/* ── LAYOUT ────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 0 16px; }

/* ── HERO ──────────────────────────────────────────────────── */
.hero {
  background: linear-gradient(145deg, #0d1117 0%, #111a27 40%, #0f1923 100%);
  color: #fff;
  text-align: center;
  padding: 48px 20px 24px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border-color);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,179,0,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(76,175,80,.06) 0%, transparent 50%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  font-weight: 900;
  color: var(--viet-gold);
  margin-bottom: 4px;
  position: relative;
}
.hero .subtitle {
  font-size: 1.15rem;
  font-weight: 500;
  opacity: .85;
  margin-bottom: 4px;
}
.hero .dates {
  font-size: 1rem;
  color: var(--mid-gray);
  margin-bottom: 16px;
}
.chip-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; position: relative; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .8rem;
  font-weight: 600;
  backdrop-filter: blur(4px);
}
.chip i { font-size: .85rem; }
.chip-gold   { background: rgba(255,179,0,.15);  color: #ffd54f; border: 1px solid rgba(255,179,0,.3); }
.chip-green  { background: rgba(76,175,80,.15);  color: #81c784; border: 1px solid rgba(76,175,80,.3); }
.chip-teal   { background: rgba(38,198,218,.15); color: #4dd0e1; border: 1px solid rgba(38,198,218,.3); }
.chip-blue   { background: rgba(66,165,245,.15); color: #64b5f6; border: 1px solid rgba(66,165,245,.3); }
.chip-red    { background: rgba(239,83,80,.15);  color: #ef9a9a; border: 1px solid rgba(239,83,80,.3); }
.chip-purple { background: rgba(171,71,188,.15); color: #ce93d8; border: 1px solid rgba(171,71,188,.3); }
.chip-navy   { background: rgba(66,165,245,.12); color: #90caf9; border: 1px solid rgba(66,165,245,.2); }

/* ── FLIGHT BANNER ─────────────────────────────────────────── */
.flight-banner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 720px;
  margin: 18px auto 0;
  position: relative;
}
.flight-banner-card {
  background: var(--surface-2);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.flight-banner-card .fb-icon {
  font-size: 1.4rem;
  padding-top: 2px;
}
.flight-banner-card .fb-icon.outbound { color: var(--viet-blue); }
.flight-banner-card .fb-icon.return   { color: var(--viet-red); }
.fb-info { flex: 1; min-width: 0; }
.fb-route {
  font-weight: 800;
  font-size: .88rem;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fb-detail {
  font-size: .78rem;
  color: var(--mid-gray);
  margin-top: 2px;
  line-height: 1.4;
}
.fb-detail strong { color: #e0e6ed; }
.fb-price {
  font-weight: 800;
  font-size: 1.1rem;
  white-space: nowrap;
  align-self: center;
}
.fb-price.outbound { color: var(--viet-blue); }
.fb-price.return   { color: var(--viet-red); }

/* ── ROUTE OVERVIEW ────────────────────────────────────────── */
.route-bar {
  background: var(--surface-2);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 16px 14px;
  margin: 14px auto 0;
  max-width: 720px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  text-align: center;
  position: relative;
}
.route-bar .stop { font-size: .85rem; font-weight: 600; }
.route-bar .stop small { display: block; font-size: .72rem; font-weight: 400; opacity: .6; margin-top: 2px; }
.route-bar .stop i { margin-right: 4px; }

/* ── NAV ────────────────────────────────────────────────────── */
.sticky-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-color);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.sticky-nav::-webkit-scrollbar { height: 0; }
.nav-inner {
  display: flex; gap: 0; max-width: 960px; margin: 0 auto;
  white-space: nowrap;
}
.nav-inner a {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 14px;
  font-size: .8rem;
  font-weight: 600;
  color: var(--mid-gray);
  border-bottom: 3px solid transparent;
  transition: all .2s;
  text-decoration: none;
}
.nav-inner a:hover, .nav-inner a.active {
  color: #fff;
  border-bottom-color: var(--viet-gold);
  text-decoration: none;
}

/* ── SECTIONS ──────────────────────────────────────────────── */
.section { padding: 32px 0 16px; }
.section-head {
  background: var(--surface-2);
  color: #fff;
  text-align: center;
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: .02em;
  border: 1px solid var(--border-color);
}
.section-head i { margin-right: 8px; color: var(--viet-gold); }

/* ── DAY CARDS ─────────────────────────────────────────────── */
.day-card {
  background: var(--day-bg);
  border-radius: 12px;
  border: 1px solid;
  box-shadow: var(--card-shadow);
  margin-bottom: 20px;
  overflow: hidden;
  transition: box-shadow .25s;
}
.day-card:hover { box-shadow: var(--card-shadow-hover); }

.day-card.border-navy   { border-color: rgba(66,165,245,.25); }
.day-card.border-blue   { border-color: rgba(66,165,245,.25); }
.day-card.border-teal   { border-color: rgba(38,198,218,.25); }
.day-card.border-green  { border-color: rgba(76,175,80,.25); }
.day-card.border-purple { border-color: rgba(171,71,188,.25); }
.day-card.border-gold   { border-color: rgba(255,179,0,.25); }
.day-card.border-red    { border-color: rgba(239,83,80,.25); }

.day-header {
  padding: 14px 18px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.day-header i.fa-chevron-down {
  margin-left: auto;
  transition: transform .3s;
  font-size: .85rem;
}
.day-header.collapsed i.fa-chevron-down { transform: rotate(-90deg); }

.day-header h3 { font-size: .95rem; font-weight: 700; }
.bg-navy   { background: linear-gradient(135deg, #1a2332, #243044); }
.bg-blue   { background: linear-gradient(135deg, #1565c0, #1976d2); }
.bg-teal   { background: linear-gradient(135deg, #00838f, #00acc1); }
.bg-green  { background: linear-gradient(135deg, #2e7d32, #43a047); }
.bg-purple { background: linear-gradient(135deg, #7b1fa2, #9c27b0); }
.bg-gold   { background: linear-gradient(135deg, #e65100, #f57c00); }
.bg-red    { background: linear-gradient(135deg, #c62828, #e53935); }

.day-body { padding: 18px 18px; }
.day-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.day-chips .chip { font-size: .76rem; padding: 4px 12px; }

/* sub-day headings inside multi-day cards */
.sub-day-heading {
  font-weight: 700;
  color: var(--viet-gold);
  font-size: .92rem;
  margin: 22px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-color);
}
.sub-day-heading:first-child { margin-top: 0; }
.sub-day-heading i { margin-right: 6px; color: var(--viet-gold); }

/* ── SCHEDULE TABLE ────────────────────────────────────────── */
.schedule { width: 100%; border-collapse: collapse; }
.schedule tr { border-bottom: 1px solid var(--border-subtle); }
.schedule tr:last-child { border-bottom: none; }
.schedule td { padding: 12px 8px; vertical-align: top; }
.schedule .time-col {
  width: 95px;
  font-weight: 700;
  color: var(--viet-teal);
  font-size: .85rem;
  white-space: nowrap;
}
.schedule .detail-col { font-size: .9rem; color: #e0e6ed; }
.schedule .detail-col strong { font-size: .9rem; color: #fff; }
.schedule .detail-col .sub { color: var(--mid-gray); font-size: .8rem; margin-top: 2px; }
.schedule .detail-col .sub a { color: #58a6ff; }
.schedule .cost-col {
  width: 88px;
  text-align: right;
  font-weight: 700;
  color: var(--viet-gold);
  font-size: .85rem;
  white-space: nowrap;
}

/* ── DAILY TOTAL ───────────────────────────────────────────── */
.daily-total {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border-color);
  text-align: right;
  font-size: 1rem;
  font-weight: 700;
  color: #e0e6ed;
}
.daily-total span { color: var(--viet-gold); }

/* ── TIP BOX ───────────────────────────────────────────────── */
.tip-box {
  background: var(--tip-bg);
  border: 1px solid var(--tip-border);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 20px;
}
.tip-box h4 {
  color: var(--viet-gold);
  font-size: .9rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.tip-box h4 i { margin-right: 6px; }
.tip-box ul { padding-left: 20px; }
.tip-box li {
  font-size: .85rem;
  margin-bottom: 4px;
  color: #c9d1d9;
}

/* ── BUDGET BOX ────────────────────────────────────────────── */
.budget-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .9rem;
}
.budget-table tr:nth-child(odd) { background: rgba(255,255,255,.03); }
.budget-table td { padding: 12px 14px; color: #e0e6ed; }
.budget-table td:first-child { width: 40px; text-align: center; color: var(--viet-blue); }
.budget-table td:last-child { text-align: right; font-weight: 600; white-space: nowrap; color: var(--viet-gold); }

.budget-total-banner {
  background: var(--surface-2);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 22px;
  text-align: center;
  margin: 20px auto;
  max-width: 680px;
}
.budget-total-banner .amount {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 900;
  color: var(--viet-gold);
}
.budget-total-banner .note { color: var(--mid-gray); font-size: .85rem; margin-top: 4px; }

/* ── INFO GRID ─────────────────────────────────────────────── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.info-card {
  border-radius: 10px;
  padding: 16px 18px;
  border: 1px solid;
  background: var(--surface-1);
}
.info-card h4 {
  font-size: .88rem;
  font-weight: 700;
  margin-bottom: 10px;
  color: #fff;
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  margin-left: -4px;
}
.info-card ul { padding-left: 18px; font-size: .85rem; color: #c9d1d9; }
.info-card li { margin-bottom: 5px; }
.info-card.card-blue   { border-color: rgba(66,165,245,.2); }
.info-card.card-blue h4   { background: rgba(66,165,245,.8); }
.info-card.card-green  { border-color: rgba(76,175,80,.2); }
.info-card.card-green h4  { background: rgba(76,175,80,.8); }
.info-card.card-gold   { border-color: rgba(255,179,0,.2); }
.info-card.card-gold h4   { background: rgba(230,140,0,.8); }
.info-card.card-red    { border-color: rgba(239,83,80,.2); }
.info-card.card-red h4    { background: rgba(239,83,80,.8); }

/* ── APPS BAR ──────────────────────────────────────────────── */
.apps-bar {
  background: var(--surface-1);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  margin-bottom: 24px;
}
.apps-bar h4 { font-size: .92rem; color: #e0e6ed; margin-bottom: 12px; }
.apps-bar .chip-row { justify-content: center; }
.apps-bar .chip {
  background: var(--surface-2);
  color: #e0e6ed;
  border: 1px solid var(--border-color);
  font-weight: 600;
}

/* ── FOOTER ────────────────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 28px 20px 36px;
  color: var(--mid-gray);
  font-size: .85rem;
  border-top: 1px solid var(--border-color);
}

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media (max-width: 640px) {
  .hero { padding: 36px 14px 20px; }
  .hero h1 { font-size: clamp(1.8rem, 7vw, 2.6rem); }
  .route-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px 10px; }
  .flight-banner { grid-template-columns: 1fr; gap: 8px; }
  .flight-banner-card { padding: 12px 14px; }
  .day-body { padding: 14px 14px; }
  .schedule .time-col { width: 76px; font-size: .8rem; }
  .schedule .cost-col { width: 70px; font-size: .8rem; }
  .nav-inner a { padding: 12px 10px; font-size: .75rem; }
  .section-head { font-size: 1rem; padding: 12px 14px; }
  .container { padding: 0 12px; }
  .day-header { padding: 12px 14px; }
  .day-header h3 { font-size: .88rem; }
  .chip { font-size: .75rem; padding: 5px 10px; }
}

/* ── PRINT ─────────────────────────────────────────────────── */
@media print {
  .sticky-nav, .flight-banner { display: none; }
  .day-body { display: block !important; max-height: none !important; }
  body { background: #fff; color: #000; }
}

/* ── COLLAPSE ANIMATION ────────────────────────────────────── */
.day-body { transition: max-height .4s ease, opacity .3s ease; overflow: hidden; }

/* ── PHOTO STRIP ────────────────────────────────────────────── */
.photo-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 2px 2px 14px;
  margin-bottom: 18px;
  scrollbar-width: thin;
  scrollbar-color: #3a4556 #161b22;
}
.photo-strip::-webkit-scrollbar { height: 5px; }
.photo-strip::-webkit-scrollbar-track { background: var(--surface-1); border-radius: 3px; }
.photo-strip::-webkit-scrollbar-thumb { background: #3a4556; border-radius: 3px; }
.photo-item {
  flex: 0 0 auto;
  width: 210px;
  height: 138px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
  position: relative;
  cursor: zoom-in;
}
.photo-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .35s ease;
}
.photo-item:hover img { transform: scale(1.06); }
.photo-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.75));
  color: #fff;
  font-size: .71rem;
  font-weight: 600;
  padding: 20px 8px 7px;
  pointer-events: none;
  letter-spacing: .01em;
}

/* ── HOTEL SHOWCASE ─────────────────────────────────────────── */
.hotel-showcase {
  display: flex;
  gap: 0;
  align-items: stretch;
  background: var(--surface-2);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  overflow: hidden;
  margin: 4px 0 18px;
  box-shadow: 0 3px 16px rgba(0,0,0,.35);
  transition: box-shadow .25s;
}
.hotel-showcase:hover { box-shadow: 0 6px 28px rgba(0,0,0,.5); }
.hotel-img {
  flex: 0 0 220px;
  overflow: hidden;
  position: relative;
}
.hotel-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .4s ease;
  display: block;
}
.hotel-showcase:hover .hotel-img img { transform: scale(1.04); }
.hotel-img .hotel-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(13,17,23,.8);
  color: #fff;
  font-size: .7rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}
.hotel-details {
  flex: 1;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.hotel-name {
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
}
.hotel-location {
  font-size: .8rem;
  color: var(--mid-gray);
}
.hotel-location i { margin-right: 4px; }
.hotel-desc {
  font-size: .85rem;
  color: #c9d1d9;
  line-height: 1.55;
  margin-top: 4px;
}
.hotel-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid var(--border-color);
}
.hotel-price {
  font-weight: 700;
  color: var(--viet-gold);
  font-size: .92rem;
}
.hotel-price small { font-size: .76rem; color: var(--mid-gray); font-weight: 400; }
.hotel-links { display: flex; gap: 8px; }
.hotel-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: .8rem;
  font-weight: 600;
  transition: all .2s;
  text-decoration: none !important;
}
.hotel-btn-primary { background: var(--viet-blue); color: #fff; }
.hotel-btn-primary:hover { background: #1e88e5; color: #fff; }
.hotel-btn-secondary { background: var(--surface-3); color: #e0e6ed; }
.hotel-btn-secondary:hover { background: #2d3f56; color: #fff; }

/* ── PHOTO LIGHTBOX ─────────────────────────────────────────── */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(0,0,0,.6);
  object-fit: contain;
}
.lightbox-caption {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: .9rem;
  background: rgba(0,0,0,.6);
  padding: 6px 16px;
  border-radius: 20px;
  pointer-events: none;
}
.lightbox-close {
  position: fixed;
  top: 18px; right: 22px;
  color: #fff;
  font-size: 1.6rem;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
}

@media (max-width: 580px) {
  .hotel-showcase { flex-direction: column; }
  .hotel-img { flex: none; width: 100%; height: 180px; }
  .hotel-details { padding: 12px 14px; }
  .photo-item { width: 170px; height: 115px; }
}
</style>
</head>
<body>

<div id="__content__"><p style="text-align:center;padding:80px 20px;color:#666;font-size:1.1rem;">Loading itinerary…</p></div>

<footer class="footer">
  <i class="fas fa-heart" style="color:var(--viet-red);"></i> Have an incredible trip to Vietnam! <i class="fas fa-heart" style="color:var(--viet-red);"></i>
</footer>

<script>
// ── Section loader ────────────────────────────────────────────────────────────
// index.html is a thin shell. All day/flight/hotel/budget content lives in the
// sections/ folder and is fetched fresh on every page load.
// To update the site: edit the right file in sections/ → save → refresh browser.
(async () => {
  const _files = [
    'sections/02-hero-banner-and-nav.html',
    'sections/03-flights-and-arrival.html',
    'sections/04-day1-hanoi-arrival.html',
    'sections/05-day2-hanoi-temples-and-night-bus.html',
    'sections/06-days3-4-sapa-fansipan-and-trek.html',
    'sections/07-days5-8-danang-beach-and-hoian.html',
    'sections/08-day8-saigon-arrival.html',
    'sections/09-days9-10-markets-spa-and-departure.html',
    'sections/10-budget-summary.html',
    'sections/11-essential-travel-info.html'
  ];
  const container = document.getElementById('__content__');
  try {
    const parts = await Promise.all(
      _files.map(url => fetch(url).then(r => { if (!r.ok) throw new Error(url); return r.text(); }))
    );
    // Section 02 opens with <body> — strip it before injecting into the existing <body>
    const cleaned = parts.map(t => t.replace(/^<body[^>]*>\s*/i, ''));
    container.outerHTML = cleaned.join('\n');
  } catch (e) {
    container.innerHTML =
      '<p style="text-align:center;padding:60px;color:#c0392b">' +
      'Could not load sections — this page must be served from a web server, ' +
      'not opened as a local file.</p>';
    return;
  }
  _initObserver();
})();

// ── Collapsible day cards ─────────────────────────────────────────────────────
function toggleCard(header) {
  const body = header.nextElementSibling;
  header.classList.toggle('collapsed');
  if (header.classList.contains('collapsed')) {
    body.style.maxHeight = '0';
    body.style.opacity = '0';
    body.style.padding = '0 20px';
  } else {
    body.style.maxHeight = body.scrollHeight + 40 + 'px';
    body.style.opacity = '1';
    body.style.padding = '';
    setTimeout(() => { body.style.maxHeight = 'none'; }, 400);
  }
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(img) {
  const lb = document.getElementById('lightbox');
  if (!lb) return;
  const lbImg    = document.getElementById('lightbox-img');
  const lbCaption = document.getElementById('lightbox-caption');
  const src = img.src.replace(/w=\d+/, 'w=1400').replace(/q=\d+/, 'q=90');
  lbImg.src = src;
  lbImg.alt = img.alt;
  lbCaption.textContent = img.alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (lb) lb.classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Active nav highlight — runs after sections are injected ───────────────────
function _initObserver() {
  const sections = document.querySelectorAll('section[id]');
  const navLinks  = document.querySelectorAll('.nav-inner a');
  const observer  = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`.nav-inner a[href="#${entry.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => observer.observe(s));
}
</script>

</body>
</html>
